  HeroTagline: "Code more during July and January. Track your commits. Compete with friends."

  WhatIsTitle: "What is Julython?"
  WhatIsBody: >-
    During the months of January and July, we're encouraging developers of all
    skill levels to try and work on your pet project(s) just a little each day.
    It's a great excuse to contribute to the communities you follow, or even
    dive into a language for the first time.

  RulesTitle: "Are There Rules?"
  RulesBody: "There is only one rule, to have fun! The goal is that you either learn something new or to help finish a project you started. If you share your repository or your commits with us, we will %{scoring_link} for each commit or new project you work on %{timing_link}."
  TallyUpPoints: "tally up points"
  DuringTheMonth: "during the month"

  JoinTitle: "How Do I Join In?"
  JoinBody: "All you need is a project to work on that isn't your regular day job. We recommend you choose something open, perhaps on GitHub or Bitbucket, so that others can see your progress. Then %{webhook_link} for your repository, and we'll track your progress next to everyone else."
  AddAWebhook: "add a webhook"

