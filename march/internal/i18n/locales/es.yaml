  HeroTagline: "Programa más durante julio y enero. Rastrea tus commits. Compite con amigos."

  WhatIsTitle: "¿Qué es Julython?"
  WhatIsBody: >-
    Durante los meses de enero y julio, animamos a desarrolladores de todos los
    niveles a trabajar en sus proyectos personales un poco cada día. Es una gran
    excusa para contribuir a las comunidades que sigues, o incluso sumergirte en
    un nuevo lenguaje por primera vez.

  RulesTitle: "¿Hay Reglas?"
  RulesBody: "Solo hay una regla: ¡divertirse! El objetivo es aprender algo nuevo o terminar un proyecto que empezaste. Si compartes tu repositorio o tus commits con nosotros, %{scoring_link} por cada commit o proyecto nuevo en el que trabajes %{timing_link}."
  TallyUpPoints: "sumaremos puntos"
  DuringTheMonth: "durante el mes"

  JoinTitle: "¿Cómo Participo?"
  JoinBody: "Solo necesitas un proyecto en el que trabajar que no sea tu trabajo habitual. Recomendamos elegir algo abierto, quizás en GitHub o Bitbucket, para que otros puedan ver tu progreso. Luego %{webhook_link} para tu repositorio, y rastrearemos tu progreso junto a todos los demás."
  AddAWebhook: "añade un webhook"

