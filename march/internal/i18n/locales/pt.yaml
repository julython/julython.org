  HeroTagline: "Programe mais durante julho e janeiro. Acompanhe seus commits. Compita com amigos."

  WhatIsTitle: "O que é Julython?"
  WhatIsBody: >-
    Durante os meses de janeiro e julho, encorajamos desenvolvedores de todos os
    níveis a trabalhar em seus projetos pessoais um pouco a cada dia. É uma
    ótima desculpa para contribuir com as comunidades que você segue, ou até
    mesmo mergulhar em uma nova linguagem pela primeira vez.

  RulesTitle: "Existem Regras?"
  RulesBody: >-
    Só há uma regra: se divertir! O objetivo é aprender algo novo ou terminar um
    projeto que você começou. Se você compartilhar seu repositório ou commits
    conosco, %{scoring_link} por cada commit ou novo projeto em que você trabalhar %{timing_link}.
  TallyUpPoints: "somaremos pontos"
  DuringTheMonth: "durante o mês"

  JoinTitle: "Como Participar?"
  JoinBody: >-
    Você só precisa de um projeto para trabalhar que não seja seu trabalho regular.
    Recomendamos escolher algo aberto, talvez no GitHub ou Bitbucket, para que outros
    possam ver seu progresso. Depois %{webhook_link} para seu repositório, e
    acompanharemos seu progresso junto com todos os outros.
