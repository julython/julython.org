services:
  api:
    build:
      context: ./
    env_file:
      - .env
      - docker-compose.env
    ports:
      - 8001:8000
    volumes:
      - go-mod-cache:/go/pkg/mod

  db_migrate:
    build:
      context: ./
    command:
      - "postgres://postgres:postgres@postgres:5432/july?sslmode=disable"
      - "up"
    env_file:
      - .env
      - docker-compose.env
    depends_on:
      db_create:
        condition: service_completed_successfully

  db_create:
    image: postgres:16-alpine
    environment:
      - PGPASSWORD=postgres
    command: >
      sh -c "psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'july'\" | grep -q 1 || psql -h postgres -U postgres -c 'CREATE DATABASE july'"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:16.6@sha256:557fea37a744d5f4c8faab304b0a90858b53ab119735a88c131fd19dab802f36
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_DB=postgres
    ports:
    - 5432:5432
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      start_period: 5s
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    container_name: adminer
    image: adminer:5.3.0@sha256:730215fe535daca9a2f378c48321bc615c8f0d88668721e0eff530fa35b6e8f6
    environment:
    - ADMINER_DESIGN='nette'
    ports:
    - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy

  smee:
    image: node:22-alpine
    command: ["npx", "smee-client", "-u", "${GITHUB_WEBHOOK_URL}", "-t", "http://api:8000/api/v1/github"]

volumes:
  go-mod-cache: